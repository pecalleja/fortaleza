<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>La Fortaleza — Draggable Map</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{--bg:#080604;--gold:#c9922a;--gold2:#e8b84b;--parch:#c4a06a;--dim:#7a5c2a;--blood:#8b1818;--glow:rgba(200,146,42,0.35);}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--parch);font-family:'IM Fell English',serif;overflow:hidden;height:100vh;width:100vw;}
header{position:fixed;top:0;left:0;right:0;z-index:300;height:50px;background:linear-gradient(to bottom,#0d0905f5,#0d090580);border-bottom:1px solid #3a2510;display:flex;align-items:center;justify-content:space-between;padding:0 18px;}
header h1{font-family:'Cinzel',serif;font-size:19px;font-weight:900;letter-spacing:5px;color:var(--gold);text-shadow:0 0 20px var(--glow);}
header .sub{font-size:10px;color:var(--dim);font-style:italic;letter-spacing:1px;}
.legend{display:flex;gap:12px;align-items:center;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;}
.leg{display:flex;align-items:center;gap:4px;color:var(--dim);}
.leg svg{width:26px;height:12px;}

#viewport{position:fixed;inset:50px 0 0 0;overflow:hidden;}
#world{position:absolute;top:0;left:0;width:4000px;height:3000px;transform-origin:0 0;}
#connsvg{position:absolute;top:0;left:0;width:4000px;height:3000px;pointer-events:none;overflow:visible;}

/* Room nodes — now draggable */
.rnode{
  position:absolute;width:116px;
  background:#120d08;border:1px solid #3a2510;border-radius:5px;
  padding:7px 8px 6px;
  user-select:none;
  cursor:grab;
  transition:border-color .12s,box-shadow .12s;
  z-index:10;
}
.rnode:hover{border-color:var(--gold);box-shadow:0 0 12px var(--glow);}
.rnode.dragging{cursor:grabbing;border-color:var(--gold2);box-shadow:0 0 20px rgba(232,184,75,.55);z-index:200;transition:none;}
.rnode.sel{border-color:var(--gold2);box-shadow:0 0 20px rgba(232,184,75,.45);z-index:50;}
.rnode.boss{border-color:#5a1a1a;background:#110808;}
.rnode.boss:hover,.rnode.boss.dragging{border-color:#cc2020;box-shadow:0 0 14px rgba(180,30,30,.5);}
.rnode.trap{border-color:#3a0a0a;background:#0d0505;opacity:.85;}
.rnode.lab{border-color:#1e1e38;background:#0a0a14;width:96px;padding:5px 6px;}

.rid{font-family:'Cinzel',serif;font-size:8px;color:var(--dim);letter-spacing:2px;margin-bottom:2px;}
.rname{font-family:'Cinzel',serif;font-size:9.5px;color:var(--parch);line-height:1.25;}
.rbadges{display:flex;flex-wrap:wrap;gap:2px;margin-top:4px;}
.rb{font-size:8px;padding:1px 4px;border-radius:2px;font-family:'Cinzel',serif;line-height:1.5;}
.rb-item{background:rgba(200,146,42,.18);color:#c9922a;}
.rb-npc{background:rgba(80,160,60,.18);color:#6aba50;}
.rb-enemy{background:rgba(160,30,30,.25);color:#e05050;}
.rb-hidden{background:rgba(120,60,200,.2);color:#a878e8;}

/* Detail panel */
#panel{position:fixed;right:0;top:50px;bottom:0;width:290px;z-index:400;background:#0e0a06;border-left:1px solid #3a2510;transform:translateX(100%);transition:transform .28s cubic-bezier(.2,0,0,1);display:flex;flex-direction:column;overflow:hidden;}
#panel.open{transform:none;}
.ph{padding:13px 15px 11px;background:#130e08;border-bottom:1px solid #3a2510;flex-shrink:0;position:relative;}
.ph-id{font-family:'Cinzel',serif;font-size:9px;color:var(--dim);letter-spacing:3px;margin-bottom:2px;}
.ph-name{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--gold);line-height:1.3;}
.ph-close{position:absolute;top:10px;right:11px;background:none;border:1px solid #3a2510;color:var(--dim);width:22px;height:22px;border-radius:2px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ph-close:hover{border-color:var(--gold);color:var(--gold);}
.pb{flex:1;overflow-y:auto;padding:13px 15px;scrollbar-width:thin;scrollbar-color:#3a2510 transparent;}
.pdesc{font-style:italic;font-size:11px;color:rgba(196,160,106,.6);line-height:1.65;margin-bottom:13px;padding-bottom:11px;border-bottom:1px solid #2a1a0a;}
.ps-t{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:13px 0 6px;}
.ps-t:first-child{margin-top:0;}
.pi{display:flex;gap:7px;align-items:flex-start;padding:6px 7px;border-radius:3px;margin-bottom:3px;background:rgba(255,255,255,.02);border:1px solid rgba(58,37,16,.4);}
.pi-ic{font-size:13px;flex-shrink:0;margin-top:1px;}
.pi-n{font-family:'Cinzel',serif;font-size:10px;color:var(--parch);margin-bottom:2px;}
.pi-d{font-size:10px;color:rgba(196,160,106,.5);font-style:italic;line-height:1.4;}
.pi.ti{border-left:2px solid var(--gold);}
.pi.tn{border-left:2px solid #5aaa40;}
.pi.te{border-left:2px solid var(--blood);}
.pi.th{border-left:2px solid #8855cc;}
.pi.td{border-left:2px solid #4488cc;}
.pi.tg{border-left:2px solid var(--blood);}
.badge{display:inline-block;font-size:8px;padding:1px 5px;border-radius:2px;font-family:'Cinzel',serif;margin-top:2px;}
.bb{background:rgba(50,130,220,.2);color:#70b8f0;font-style:italic;}
.bg{background:rgba(80,160,50,.2);color:#80d060;}
.bw{background:rgba(140,24,24,.3);color:#f07070;}
.br{background:rgba(120,50,200,.2);color:#c080f0;}

/* Controls */
.zc{position:fixed;bottom:18px;left:18px;z-index:300;display:flex;flex-direction:column;gap:4px;}
.zb{width:32px;height:32px;background:rgba(10,6,3,.92);border:1px solid #3a2510;color:var(--dim);border-radius:3px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Cinzel',serif;}
.zb:hover{border-color:var(--gold);color:var(--gold);}
.zlbl{text-align:center;font-family:'Cinzel',serif;font-size:8px;color:var(--dim);background:rgba(10,6,3,.9);border:1px solid rgba(58,37,16,.4);border-radius:2px;padding:2px 4px;}
.hint{position:fixed;bottom:14px;right:14px;z-index:300;font-size:9px;color:rgba(196,160,106,.22);text-align:right;line-height:2;pointer-events:none;font-style:italic;}
</style>

const NS='http://www.w3.org/2000/svg';
const svgEl=document.getElementById('connsvg');

const TSTYLE={
  open:  {stroke:'#3a6a2a',dash:'none',w:1.8,arr:'open'},
  locked:{stroke:'#8a5010',dash:'5 3', w:1.8,arr:'locked'},
  riddle:{stroke:'#5050b0',dash:'6 3', w:1.8,arr:'riddle'},
  danger:{stroke:'#9b2020',dash:'4 3', w:1.8,arr:'danger'},
  hidden:{stroke:'#7a3aaa',dash:'3 4', w:1.5,arr:'hidden'},
};

function buildArrows(){
  let d=svgEl.querySelector('defs');
  if(!d){d=document.createElementNS(NS,'defs');svgEl.insertBefore(d,svgEl.firstChild);}
  d.innerHTML='';
  [['open','#3a6a2a'],['locked','#8a5010'],['riddle','#5050b0'],['danger','#9b2020'],['hidden','#7a3aaa']].forEach(([k,c])=>{
    const m=document.createElementNS(NS,'marker');
    m.setAttribute('id','arr-'+k);m.setAttribute('markerWidth','7');m.setAttribute('markerHeight','7');
    m.setAttribute('refX','6');m.setAttribute('refY','3.5');m.setAttribute('orient','auto');
    const p=document.createElementNS(NS,'path');p.setAttribute('d','M0,0 L0,7 L7,3.5 z');p.setAttribute('fill',c);
    m.appendChild(p);d.appendChild(m);
  });
}

// Map: linkId -> SVG group element for fast update
const linkEls={};

function cx(id){const p=pos[id];return p?p.x+W/2:null;}
function cy(id){const p=pos[id];return p?p.y+H/2:null;}

function initSVGLinks(){
  // Remove all non-defs children
  [...svgEl.children].forEach(c=>{if(c.tagName!=='defs')svgEl.removeChild(c);});
  // Count links per directional pair for offset
  const pairCount={};
  LINKS.forEach(lk=>{ const k=`${lk.f}-${lk.t}`; pairCount[k]=(pairCount[k]||0)+1; });
  const pairIdx={};

  LINKS.forEach((lk,i)=>{
    const k=`${lk.f}-${lk.t}`;
    pairIdx[k]=(pairIdx[k]||0);
    const myIdx=pairIdx[k];
    pairIdx[k]++;
    const total=pairCount[k];

    const st=TSTYLE[lk.type]||TSTYLE.open;
    const label=lk.pw?`${lk.n} 🔒`:lk.ans?`${lk.n} ❓`:lk.need?`${lk.n} ⚠️`:lk.tool?`${lk.n} 🔍`:lk.n;
    const approxW=label.length*4.5+10;

    const g=document.createElementNS(NS,'g');
    g.dataset.li=i;
    g.dataset.f=lk.f;g.dataset.t=lk.t;
    g.dataset.myIdx=myIdx;g.dataset.total=total;
    g.dataset.label=label;g.dataset.aw=approxW;
    g.dataset.stroke=st.stroke;g.dataset.arr=st.arr;
    g.dataset.w=st.w;g.dataset.dash=st.dash;

    // Line
    const line=document.createElementNS(NS,'line');
    line.setAttribute('stroke',st.stroke);
    line.setAttribute('stroke-width',st.w);
    if(st.dash!=='none')line.setAttribute('stroke-dasharray',st.dash);
    line.setAttribute('marker-end','url(#arr-'+st.arr+')');
    g.appendChild(line);

    // Label bg
    const bg=document.createElementNS(NS,'rect');
    bg.setAttribute('width',approxW);bg.setAttribute('height',13);bg.setAttribute('rx','2');
    bg.setAttribute('fill','rgba(5,3,1,0.88)');
    g.appendChild(bg);

    // Label text
    const txt=document.createElementNS(NS,'text');
    txt.setAttribute('text-anchor','middle');txt.setAttribute('y','2');
    txt.setAttribute('font-size','7.5');txt.setAttribute('font-family','Cinzel,serif');
    txt.setAttribute('letter-spacing','0.4');
    const tc=st.stroke==='#3a6a2a'?'#5aaa4a':st.stroke==='#9b2020'?'#e06060':st.stroke==='#5050b0'?'#8888ee':st.stroke==='#8a5010'?'#d07030':'#a060e0';
    txt.setAttribute('fill',tc);
    txt.textContent=label;
    g.appendChild(txt);

    svgEl.appendChild(g);
    linkEls[i]=g;
  });
}

function updateLinkPositions(){
  for(let i=0;i<LINKS.length;i++){
    const g=linkEls[i];
    if(!g) continue;
    const f=+g.dataset.f,t=+g.dataset.t;
    const x1=cx(f),y1=cy(f),x2=cx(t),y2=cy(t);
    if(x1===null||x2===null||f===t) continue;

    const myIdx=+g.dataset.myIdx,total=+g.dataset.total;
    const aw=+g.dataset.aw;
    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
    const nx=-dy/len,ny=dx/len;
    const offD=total>1?(myIdx-(total-1)/2)*9:0;
    const ax1=x1+nx*offD,ay1=y1+ny*offD,ax2=x2+nx*offD,ay2=y2+ny*offD;

    const line=g.children[0];
    line.setAttribute('x1',ax1);line.setAttribute('y1',ay1);
    line.setAttribute('x2',ax2);line.setAttribute('y2',ay2);

    const mx=(ax1+ax2)/2,my=(ay1+ay2)/2;
    const angle=Math.atan2(ay2-ay1,ax2-ax1)*180/Math.PI;
    const ra=(angle>90||angle<-90)?angle+180:angle;

    const bg=g.children[1],txt=g.children[2];
    bg.setAttribute('x',-aw/2);bg.setAttribute('y',-8);
    const gt=`translate(${mx},${my}) rotate(${ra})`;
    bg.setAttribute('transform',gt);
    txt.setAttribute('transform',gt);
    txt.setAttribute('x','0');
  }
}

const world=document.getElementById('world');
const nodeEls={};

function countRoom(id){
  const it=(ITEMS[id]||[]).length;
  const all=NPCS[id]||[];
  return{it,np:all.filter(n=>n.t==='npc').length,en:all.filter(n=>n.t==='enemy').length,hd:(HIDDEN_OBJ[id]||[]).length};
}

function buildRooms(){
  // Remove old nodes
  Object.values(nodeEls).forEach(el=>el.parentNode&&el.parentNode.removeChild(el));
  for(const k in nodeEls) delete nodeEls[k];

  for(const [ids,room] of Object.entries(ROOMS)){
    const id=+ids;
    const p=pos[id]; if(!p) continue;
    const isLab=room.zone==='labyrinth';
    const isBoss=[12,19,20,21,22,29].includes(id);
    const isTrap=[26].includes(id);

    const div=document.createElement('div');
    div.className='rnode'+(isBoss?' boss':'')+(isTrap?' trap':'')+(isLab?' lab':'');
    div.style.left=p.x+'px';div.style.top=p.y+'px';
    div.style.width=(isLab?'96px':'116px');
    div.dataset.id=id;

    const c=countRoom(id);
    let badges='';
    if(c.it>0) badges+=`<span class="rb rb-item">📦${c.it}</span>`;
    if(c.np>0) badges+=`<span class="rb rb-npc">👤${c.np}</span>`;
    if(c.en>0) badges+=`<span class="rb rb-enemy">⚔️${c.en}</span>`;
    if(c.hd>0) badges+=`<span class="rb rb-hidden">🔍${c.hd}</span>`;
    div.innerHTML=`<div class="rid">R${id}</div><div class="rname">${room.name}</div>${badges?`<div class="rbadges">${badges}</div>`:''}`;

    attachDrag(div,id);
    div.addEventListener('click',e=>{if(!wasDragged)openPanel(id);});
    world.appendChild(div);
    nodeEls[id]=div;
  }
}

// ═══════════════════════════════════════════════════════
// ROOM DRAGGING
// ═══════════════════════════════════════════════════════
let wasDragged=false;

function attachDrag(el,id){
  el.addEventListener('mousedown',e=>{
    if(e.button!==0) return;
    e.stopPropagation();
    e.preventDefault();
    wasDragged=false;
    const startX=e.clientX/scale,startY=e.clientY/scale;
    const startPX=pos[id].x,startPY=pos[id].y;
    el.classList.add('dragging');
    el.style.zIndex=200;

    const mm=ev=>{
      const dx=ev.clientX/scale-startX,dy=ev.clientY/scale-startY;
      if(Math.abs(dx)+Math.abs(dy)>3) wasDragged=true;
      pos[id].x=startPX+dx;
      pos[id].y=startPY+dy;
      el.style.left=pos[id].x+'px';
      el.style.top=pos[id].y+'px';
      updateLinkPositions();
    };
    const mu=()=>{
      el.classList.remove('dragging');
      el.style.zIndex=10;
      window.removeEventListener('mousemove',mm);
      window.removeEventListener('mouseup',mu);
    };
    window.addEventListener('mousemove',mm);
    window.addEventListener('mouseup',mu);
  });

  // Touch drag
  el.addEventListener('touchstart',e=>{
    if(e.touches.length!==1) return;
    e.stopPropagation();
    wasDragged=false;
    const t0=e.touches[0];
    const startX=t0.clientX/scale,startY=t0.clientY/scale;
    const startPX=pos[id].x,startPY=pos[id].y;
    el.classList.add('dragging');

    const mm=ev=>{
      ev.preventDefault();
      const dx=ev.touches[0].clientX/scale-startX,dy=ev.touches[0].clientY/scale-startY;
      if(Math.abs(dx)+Math.abs(dy)>3) wasDragged=true;
      pos[id].x=startPX+dx;pos[id].y=startPY+dy;
      el.style.left=pos[id].x+'px';el.style.top=pos[id].y+'px';
      updateLinkPositions();
    };
    const mu=()=>{
      el.classList.remove('dragging');
      el.removeEventListener('touchmove',mm);el.removeEventListener('touchend',mu);
    };
    el.addEventListener('touchmove',mm,{passive:false});
    el.addEventListener('touchend',mu);
  },{passive:true});
}

let selId=null;
function openPanel(id){
  if(selId===id){closePanel();return;}
  selId=id;
  Object.values(nodeEls).forEach(e=>e.classList.remove('sel'));
  nodeEls[id]?.classList.add('sel');
  document.getElementById('ph-id').textContent='ROOM '+id;
  document.getElementById('ph-name').textContent=ROOMS[id]?.name||'—';
  let html='';
  if(ROOM_DESC[id]) html+=`<div class="pdesc">${ROOM_DESC[id]}</div>`;

  const exits=LINKS.filter(l=>l.f===id);
  if(exits.length){
    html+=`<div class="ps-t">🚪 Exits</div>`;
    exits.forEach(lk=>{
      const dest=ROOMS[lk.t]?.name||'Room '+lk.t;
      const cls=lk.type==='danger'?'tg':lk.type==='hidden'?'th':'td';
      const icon=lk.type==='locked'?'🔒':lk.type==='riddle'?'❓':lk.type==='danger'?'⚠️':lk.type==='hidden'?'🔍':'🟢';
      html+=`<div class="pi ${cls}"><div class="pi-ic">${icon}</div><div><div class="pi-n">${lk.n} → ${dest} (R${lk.t})</div>${lk.pw?`<span class="badge bb">KEY: "${lk.pw}"</span>`:''} ${lk.ans?`<span class="badge br">ANS: "${lk.ans}"</span>`:''} ${lk.need?`<span class="badge bw">NEED: ${lk.need}</span>`:''} ${lk.tool?`<span class="badge bg">BREAK: ${lk.tool}</span>`:''}</div></div>`;
    });
  }

  const itms=ITEMS[id];
  if(itms?.length){
    html+=`<div class="ps-t">📦 Items</div>`;
    itms.forEach(it=>{html+=`<div class="pi ti"><div class="pi-ic">${it.i}</div><div><div class="pi-n">${it.n}</div><div class="pi-d">${it.d}</div></div></div>`;});
  }
  const np=NPCS[id];
  if(np?.length){
    html+=`<div class="ps-t">👤 Characters</div>`;
    np.forEach(n=>{
      const cls=n.t==='enemy'?'te':'tn';
      html+=`<div class="pi ${cls}"><div class="pi-ic">${n.i}</div><div><div class="pi-n">${n.n}</div>${n.w?`<span class="badge bg">WANTS: ${n.w}</span>`:''} ${n.wp?`<span class="badge bw">KILL: ${n.wp}</span>`:''} ${n.hid?`<span class="badge br">🔍 Hidden in monolith</span>`:''}<div class="pi-d">"${n.h}"</div></div></div>`;
    });
  }
  const ho=HIDDEN_OBJ[id];
  if(ho?.length){
    html+=`<div class="ps-t">🔍 Hidden Objects</div>`;
    ho.forEach(h=>{html+=`<div class="pi th"><div class="pi-ic">${h.i}</div><div><div class="pi-n">${h.n}</div><span class="badge bg">BREAK: ${h.tool}</span><div class="pi-d">Reveals: ${h.rev}</div></div></div>`;});
  }

  document.getElementById('pb').innerHTML=html||'<div class="pdesc">No special details.</div>';
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  selId=null;
  Object.values(nodeEls).forEach(e=>e.classList.remove('sel'));
  document.getElementById('panel').classList.remove('open');
}
document.getElementById('ph-close').addEventListener('click',closePanel);

// VIEWPORT PAN / ZOOM
// ═══════════════════════════════════════════════════════
let scale=0.65,panX=30,panY=20;
const vp=document.getElementById('viewport');

function applyT(){
  world.style.transform=`translate(${panX}px,${panY}px) scale(${scale})`;
  document.getElementById('zlbl').textContent=Math.round(scale*100)+'%';
}

// Pan only on right-click, middle-click, or drag on empty area
let isPanning=false,panStart={x:0,y:0},panOrigin={x:0,y:0};
vp.addEventListener('mousedown',e=>{
  if(e.target.closest('.rnode')) return;
  if(e.button===0||e.button===1||e.button===2){
    isPanning=true;
    panStart={x:e.clientX,y:e.clientY};
    panOrigin={x:panX,y:panY};
    vp.style.cursor='grabbing';
    e.preventDefault();
  }
});
window.addEventListener('mousemove',e=>{
  if(!isPanning) return;
  panX=panOrigin.x+(e.clientX-panStart.x);
  panY=panOrigin.y+(e.clientY-panStart.y);
  applyT();
});
window.addEventListener('mouseup',e=>{
  if(isPanning){isPanning=false;vp.style.cursor='default';}
});
vp.addEventListener('contextmenu',e=>e.preventDefault());

vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=vp.getBoundingClientRect();
  const mx=e.clientX-r.left,my=e.clientY-r.top;
  const ns=Math.max(0.15,Math.min(2.5,scale*(e.deltaY>0?0.88:1.12)));
  const f=ns/scale;
  panX=mx-f*(mx-panX);panY=my-f*(my-panY);
  scale=ns;applyT();
},{passive:false});

document.getElementById('zi').addEventListener('click',()=>{scale=Math.min(2.5,scale*1.2);applyT();});
document.getElementById('zo').addEventListener('click',()=>{scale=Math.max(0.15,scale/1.2);applyT();});
document.getElementById('zf').addEventListener('click',()=>{
  const cw=vp.offsetWidth,ch=vp.offsetHeight;
  // Find bounding box of all placed rooms
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const id in pos){const p=pos[id];if(p){minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);maxX=Math.max(maxX,p.x+W);maxY=Math.max(maxY,p.y+H);}}
  const rw=maxX-minX+60,rh=maxY-minY+60;
  scale=Math.min(cw/rw,ch/rh)*0.9;
  panX=(cw-rw*scale)/2-minX*scale+30*scale;
  panY=(ch-rh*scale)/2-minY*scale+30*scale;
  applyT();
});
document.getElementById('zr').addEventListener('click',()=>{
  resetPositions();
  for(const id in nodeEls){
    const p=pos[id];if(!p) continue;
    nodeEls[id].style.left=p.x+'px';nodeEls[id].style.top=p.y+'px';
  }
  updateLinkPositions();
  document.getElementById('zf').click();
});

// Touch pan/zoom on viewport
let vpTouchStart=null,vpPanOrigin=null,vpTouchDist=null;
vp.addEventListener('touchstart',e=>{
  if(e.target.closest('.rnode')) return;
  if(e.touches.length===1){
    vpTouchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
    vpPanOrigin={x:panX,y:panY};
  } else if(e.touches.length===2){
    vpTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:true});
vp.addEventListener('touchmove',e=>{
  if(e.target.closest('.rnode')) return;
  e.preventDefault();
  if(e.touches.length===1&&vpTouchStart&&vpPanOrigin){
    panX=vpPanOrigin.x+(e.touches[0].clientX-vpTouchStart.x);
    panY=vpPanOrigin.y+(e.touches[0].clientY-vpTouchStart.y);
    applyT();
  } else if(e.touches.length===2&&vpTouchDist){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    scale=Math.max(0.15,Math.min(2.5,scale*(d/vpTouchDist)));
    vpTouchDist=d;applyT();
  }
},{passive:false});
vp.addEventListener('touchend',()=>{vpTouchStart=null;vpPanOrigin=null;vpTouchDist=null;},{passive:true});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
buildArrows();
buildRooms();
initSVGLinks();
updateLinkPositions();
applyT();
setTimeout(()=>document.getElementById('zf').click(),80);
</script>
